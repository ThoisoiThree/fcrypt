name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build and Package (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
            bin: fcrypt
            archive: tar.gz
          - os: macos-latest
            platform: macos-x86_64
            bin: fcrypt
            archive: tar.gz
          - os: windows-latest
            platform: windows-x86_64
            bin: fcrypt.exe
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked

      - name: Package tarball (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          ARCHIVE="fcrypt-${{ matrix.platform }}.${{ matrix.archive }}"
          tar -czf "dist/${ARCHIVE}" \
            -C target/release "${{ matrix.bin }}" \
            -C . README.md LICENSE CHANGELOG.md
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "dist/${ARCHIVE}" > "dist/${ARCHIVE}.sha256"
          else
            shasum -a 256 "dist/${ARCHIVE}" | awk '{print tolower($1)"  '"${ARCHIVE}"'"}' > "dist/${ARCHIVE}.sha256"
          fi

      - name: Package zip (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          $archive = "fcrypt-${{ matrix.platform }}.${{ matrix.archive }}"
          Compress-Archive -Path @("target/release/${{ matrix.bin }}", "README.md", "LICENSE", "CHANGELOG.md") -DestinationPath "dist/$archive" -Force
          $hash = (Get-FileHash -Algorithm SHA256 "dist/$archive").Hash.ToLower()
          "$hash  $archive" | Out-File -Encoding ascii "dist/$archive.sha256"

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: dist/*

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
